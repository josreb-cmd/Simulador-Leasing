<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Simulador de Leasing</title>

<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #eef1f7;
        padding: 40px;
        color: #333;
        margin: 0;
    }

    .container {
        max-width: 1000px;
        margin: auto;
        background: #ffffff;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h2 {
        margin-top: 0;
        font-weight: 700;
        color: #1a2a6c;
        text-align: center;
        font-size: 1.9rem;
    }

    label {
        display: block;
        margin-top: 18px;
        font-weight: 600;
        color: #1a2a6c;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        border: 1px solid #cfd6e4;
        border-radius: 6px;
        font-size: 15px;
        box-sizing: border-box;
    }

    button {
        margin-top: 25px;
        padding: 14px;
        width: 100%;
        background: linear-gradient(135deg, #1a2a6c, #1a73e8);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        opacity: 0.9;
    }

    /* ---------- CARDS RESUMO PREMIUM ---------- */
    .resumo-cards {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 30px;
    }

    .card {
        background: #f0f4ff;
        padding: 16px 20px;
        border-radius: 8px;
        min-width: 220px;
        border-left: 4px solid #1a73e8;
        flex: 1;
    }

    .card .titulo {
        font-size: 0.95rem;
        color: #1a2a6c;
        font-weight: 600;
    }

    .card .valor {
        font-size: 1.35rem;
        font-weight: 700;
        margin-top: 6px;
        color: #1a2a6c;
    }

    /* ---------- TABELA ---------- */
    #tabela {
        margin-top: 25px;
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        min-width: 800px;
    }

    th {
        background: #1a2a6c;
        color: white;
        padding: 10px;
        text-align: center;
        font-weight: 600;
    }

    td {
        padding: 8px;
        border-bottom: 1px solid #d8dfea;
        text-align: right;
    }

    td:first-child {
        text-align: center;
    }
</style>
</head>

<body>
<div class="container">
    <h2>Simulador de Leasing </h2>

    <label>Valor do contrato (€)
        <input type="number" id="valorContrato" value="90000">
    </label>

    <label>Entrada inicial (€)
        <input type="number" id="entradaInicial" value="10000">
    </label>

    <label>Taxa de juro anual (%)
        <input type="number" id="taxaAnual" value="5.53" step="0.01">
    </label>

    <label>Prazo total (meses)
        <input type="number" id="prazo" value="84">
    </label>

    <label>Valor residual (% sobre o valor do contrato)
        <input type="number" id="valorResidual" value="2" step="0.1">
    </label>

    <button onclick="calcular()">Executar Simulação</button>

    <div id="resumoCards" class="resumo-cards"></div>

    <h3 style="margin-top:35px; color:#1a2a6c; font-size:1.3rem;">Tabela de Amortização</h3>
    <div id="tabela"></div>
</div>

<script>
/* ---------- FORMATADOR PT-PT ---------- */
function fmt(v) {
    return v.toLocaleString("pt-PT", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    });
}

function calcular() {
    const PV = parseFloat(document.getElementById('valorContrato').value);
    const entrada = parseFloat(document.getElementById('entradaInicial').value);
    const taxaAnual = parseFloat(document.getElementById('taxaAnual').value) / 100;
    const prazoTotal = parseInt(document.getElementById('prazo').value, 10);
    const residualPerc = parseFloat(document.getElementById('valorResidual').value) / 100;

    const i = taxaAnual / 12;
    const PV1 = PV - entrada;
    const VR = PV * residualPerc;
    const n = prazoTotal - 1;

    /* ---------- FÓRMULA ORIGINAL (mantida) ---------- */
    const fator = Math.pow(1 + i, n);
    const renda = ((PV1 - VR / fator) * i) / (1 - 1 / fator);

    gerarTabela(prazoTotal, renda, i, PV1, VR, entrada);
}

function gerarTabela(prazoTotal, renda, i, saldoInicial, VR, entrada) {
    let saldo = saldoInicial;
    let html = `
        <table>
            <tr>
                <th>Mês</th>
                <th>Renda (€)</th>
                <th>Juros (€)</th>
                <th>Amortização (€)</th>
                <th>Saldo (€)</th>
            </tr>
    `;

    let totalJuros = 0;
    let totalAmort = entrada;

    /* ---------- Mês 1: Entrada ---------- */
    html += `
        <tr>
            <td>1</td>
            <td>${fmt(entrada)}</td>
            <td>0,00</td>
            <td>${fmt(entrada)}</td>
            <td>${fmt(saldo)}</td>
        </tr>
    `;

    for (let mes = 2; mes <= prazoTotal; mes++) {
        const juros = saldo * i;
        let amort = renda - juros;

        if (mes === prazoTotal) {
            amort = saldo - VR;
            saldo = VR;
        } else {
            saldo -= amort;
        }

        totalJuros += juros;
        totalAmort += amort;

        html += `
            <tr>
                <td>${mes}</td>
                <td>${fmt(renda)}</td>
                <td>${fmt(juros)}</td>
                <td>${fmt(amort)}</td>
                <td>${fmt(saldo)}</td>
            </tr>
        `;
    }

    html += `</table>`;
    document.getElementById('tabela').innerHTML = html;

    /* ---------- RESUMO PREMIUM ---------- */
    const totalPago = totalAmort + totalJuros + VR;

    document.getElementById('resumoCards').innerHTML = `
        <div class="card">
            <div class="titulo">Entrada Inicial</div>
            <div class="valor">${fmt(entrada)} €</div>
        </div>

        <div class="card">
            <div class="titulo">Renda Mensal</div>
            <div class="valor">${fmt(renda)} €</div>
        </div>

        <div class="card">
            <div class="titulo">Total Amortizado (Capital)</div>
            <div class="valor">${fmt(totalAmort)} €</div>
        </div>

        <div class="card">
            <div class="titulo">Total de Juros</div>
            <div class="valor">${fmt(totalJuros)} €</div>
        </div>

        <div class="card">
            <div class="titulo">Valor Residual</div>
            <div class="valor">${fmt(VR)} €</div>
        </div>

        <div class="card">
            <div class="titulo">Total Pago no Contrato</div>
            <div class="valor">${fmt(totalPago)} €</div>
        </div>
    `;
}
</script>

</body>
</html>
